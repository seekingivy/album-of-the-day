name: Daily Album Pick

on:
  schedule:
    # 12:00 UTC = 7:00 AM CDT (summer) / 6:00 AM CST (winter).
    # One-hour DST drift is expected and harmless — see project notes.
    - cron: '0 12 * * *'
  workflow_dispatch:   # lets you trigger a run manually from the Actions tab

jobs:
  pick:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python picker.py
      - name: Commit outputs
        run: |
          git config user.name "album-bot"
          git config user.email "bot@users.noreply.github.com"
          git add feed.xml catalog.json today.json
          git diff --cached --quiet || git commit -m "daily pick: $(date +%Y-%m-%d)"
          git push
